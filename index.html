<!DOCTYPE html>
<html lang="en"><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Camino Health — Coming Soon</title>
<link href="Camino%20Health%20%E2%80%94%20Coming%20Soon_files/css2.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; }
  body {
    font-family: 'Jost', sans-serif;
    background: #0a2a3a;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    min-height: 100vh;
    position: relative;
  }
  .sky {
    position: fixed;
    inset: 0;
    background: linear-gradient(
      180deg,
      #e8c87a 0%,
      #f0d88a 12%,
      #f5e3a0 24%,
      #e8d4b8 36%,
      #d4c8d8 48%,
      #b8cce8 62%,
      #9ab8d8 76%,
      #7aaac8 88%,
      #5a98b8 100%
    );
    z-index: 0;
  }
  canvas#ocean {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    z-index: 1;
  }
  .container {
    position: fixed;
    top: 12%;
    left: 50%;
    transform: translateX(-50%) translateY(30px);
    z-index: 10;
    display: flex;
    flex-direction: row;
    align-items: center;
    justify-content: center;
    gap: 3.5rem;
    padding: 2.5rem 4rem;
    opacity: 0;
    animation: emerge 2s cubic-bezier(0.22, 1, 0.36, 1) 0.5s forwards;
  }
  .logo-wrap {
    position: relative;
    flex-shrink: 0;
  }
  /* Soft ambient glow — no blur filter to avoid black-oval artifact */
  .logo-glow {
    position: absolute;
    inset: -50px;
    border-radius: 50%;
    background: radial-gradient(
      ellipse at center,
      rgba(110,210,235,0.18) 0%,
      rgba(60,160,195,0.08) 50%,
      transparent 72%
    );
    pointer-events: none;
  }
  .logo {
    width: 260px;
    max-width: 38vw;
    position: relative;
    z-index: 1;
    animation: floatLogo 7s ease-in-out infinite;
    filter:
      drop-shadow(0 4px 18px rgba(20,60,100,0.30))
      drop-shadow(0 1px 4px rgba(10,30,60,0.18));
  }
  .text-wrap {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    text-align: left;
  }
  .divider {
    width: 1px;
    align-self: stretch;
    background: linear-gradient(180deg, transparent 0%, rgba(60,80,110,0.35) 30%, rgba(60,80,110,0.35) 70%, transparent 100%);
    flex-shrink: 0;
    opacity: 0;
    animation: fadeIn 1s ease 1.4s forwards;
  }
  .eyebrow {
    font-family: 'Jost', sans-serif;
    font-weight: 400;
    font-size: 10px;
    letter-spacing: 0.55em;
    text-transform: uppercase;
    color: rgba(40,65,100,0.75);
    margin-bottom: 1rem;

    opacity: 0;
    animation: fadeIn 1s ease 1.6s forwards;
  }
  .headline {
    font-family: 'Playfair Display', Georgia, serif;
    font-weight: 400;
    font-size: clamp(30px, 3.8vw, 54px);
    line-height: 1.18;
    color: rgba(18,42,72,0.90);
    letter-spacing: -0.01em;
    opacity: 0;
    animation: fadeIn 1s ease 1.8s forwards;
  }
  .headline em {
    font-style: italic;
    font-weight: 300;
    color: #1a5c8a;
  }
  .headline strong {
    font-weight: 500;
    font-style: normal;
    color: rgba(18,42,72,0.95);
  }

  /* ── Mobile ── */
  @media (max-width: 640px) {
    body { align-items: center; }
    .container {
      flex-direction: column;
      align-items: center;
      gap: 1.4rem;
      padding: 1.5rem 1.8rem;
      top: 50%;
      width: 100%;
      max-width: 100vw;
      transform: translate(-50%, -50%) translateY(30px);
    }
    .logo {
      width: 160px;
      max-width: 55vw;
    }
    .divider {
      width: 48px;
      height: 1px;
      align-self: auto;
      background: linear-gradient(90deg, transparent, rgba(60,80,110,0.35), transparent);
    }
    .text-wrap {
      align-items: center;
      text-align: center;
    }
    .eyebrow {
      font-size: 9px;
      letter-spacing: 0.45em;
    }
    .headline {
      font-size: clamp(26px, 7.5vw, 36px);
      line-height: 1.2;
    }
  }

  /* ── Very small phones ── */
  @media (max-width: 380px) {
    .logo { width: 130px; }
    .headline { font-size: 24px; }
  }
  @keyframes emerge {
    to { opacity: 1; transform: translateX(-50%) translateY(0); }
  }
  @keyframes fadeIn {
    to { opacity: 1; }
  }
  @keyframes floatLogo {
    0%, 100% { transform: translateY(0px) rotate(0deg); }
    33%       { transform: translateY(-8px) rotate(0.3deg); }
    66%       { transform: translateY(-4px) rotate(-0.2deg); }
  }
</style>
</head>

  }

  var waves = [
    { yFrac:0.52, amp:0.022, freq:0.008,  spd:0.6,  phase:0.0, colorTop:'rgba(10,80,110,0.95)',   colorBot:'rgba(5,40,70,1.0)' },
    { yFrac:0.56, amp:0.028, freq:0.007,  spd:0.5,  phase:1.2, colorTop:'rgba(15,95,130,0.97)',   colorBot:'rgba(8,50,85,1.0)' },
    { yFrac:0.61, amp:0.035, freq:0.006,  spd:0.4,  phase:2.4, colorTop:'rgba(20,110,148,0.98)',  colorBot:'rgba(10,60,100,1.0)' },
    { yFrac:0.67, amp:0.045, freq:0.0050, spd:0.35, phase:0.8, colorTop:'rgba(25,125,162,0.99)',  colorBot:'rgba(12,68,112,1.0)' },
    { yFrac:0.73, amp:0.058, freq:0.0042, spd:0.3,  phase:3.0, colorTop:'rgba(30,140,175,0.99)',  colorBot:'rgba(15,78,125,1.0)' },
    { yFrac:0.80, amp:0.075, freq:0.0035, spd:0.25, phase:1.5, colorTop:'rgba(40,155,190,1.0)',   colorBot:'rgba(18,88,138,1.0)' },
    { yFrac:0.87, amp:0.095, freq:0.003,  spd:0.22, phase:0.4, colorTop:'rgba(50,170,205,1.0)',   colorBot:'rgba(22,98,150,1.0)' },
    { yFrac:0.92, amp:0.06,  freq:0.0045, spd:0.35, phase:2.2, colorTop:'rgba(200,240,248,0.92)', colorBot:'rgba(60,180,215,1.0)' },
  ];

  // Get the wave Y at a specific x position for a given wave layer
  function getWaveY(wave, x) {
    var baseY = H * wave.yFrac;
    var amp   = H * wave.amp;
    var nx    = x / W;
    return baseY + sineWave(nx * W, t, wave.freq, wave.spd, wave.phase) * amp;
  }

  function drawHorizon() {
    var hY = H * 0.52;
    var grad = ctx.createLinearGradient(0, hY - 30, 0, hY + 50);
    grad.addColorStop(0,   'rgba(100,155,195,0.0)');
    grad.addColorStop(0.4, 'rgba(80,135,175,0.20)');
    grad.addColorStop(0.7, 'rgba(30,90,130,0.65)');
    grad.addColorStop(1,   'rgba(10,60,100,0.95)');
    ctx.fillStyle = grad;
    ctx.fillRect(0, hY - 30, W, 80);
  }

  function drawSunReflection() {
    var cx = W * 0.5;
    var hY = H * 0.53;
    var grad = ctx.createRadialGradient(cx, hY, 0, cx, hY, W * 0.35);
    grad.addColorStop(0,   'rgba(255,240,180,0.18)');
    grad.addColorStop(0.3, 'rgba(255,220,120,0.08)');
    grad.addColorStop(1,   'rgba(255,200,80,0.0)');
    ctx.fillStyle = grad;
    ctx.fillRect(0, hY, W, H * 0.3);

    var numStreaks = 12;
    for (var i = 0; i < numStreaks; i++) {
      var streak_t = t * 0.015 + i * 0.7;
      var sx = cx + Math.sin(streak_t + i * 1.3) * W * 0.12 * (i % 3 === 0 ? 1.5 : 1);
      var sy = hY + 20 + i * 14 + Math.sin(streak_t * 1.4) * 8;
      var sw = 30 + Math.sin(streak_t * 0.9 + i) * 18;
      var sg = ctx.createLinearGradient(sx - sw, sy, sx + sw, sy);
      sg.addColorStop(0,   'rgba(255,245,200,0)');
      sg.addColorStop(0.5, 'rgba(255,245,200,' + (0.25 + 0.1 * Math.sin(streak_t)) + ')');
      sg.addColorStop(1,   'rgba(255,245,200,0)');
      ctx.fillStyle = sg;
      ctx.fillRect(sx - sw, sy - 1, sw * 2, 2);
    }
  }

  function drawWave(wave) {
    var baseY = H * wave.yFrac;
    var amp   = H * wave.amp;
    ctx.beginPath();
    ctx.moveTo(0, H);
    for (var x = 0; x <= W; x += 3) {
      var nx = x / W;
      var y  = baseY + sineWave(nx * W, t, wave.freq, wave.spd, wave.phase) * amp;
      if (x === 0) ctx.moveTo(x, y);
      else         ctx.lineTo(x, y);
    }
    ctx.lineTo(W, H);
    ctx.lineTo(0, H);
    ctx.closePath();
    var grad = ctx.createLinearGradient(0, baseY - amp * 1.5, 0, baseY + amp * 0.5);
    grad.addColorStop(0, wave.colorTop);
    grad.addColorStop(1, wave.colorBot);
    ctx.fillStyle = grad;
    ctx.fill();
  }

  function drawFoamCrest(wave, alphaScale) {
    var baseY = H * wave.yFrac;
    var amp   = H * wave.amp;
    ctx.beginPath();
    for (var x = 0; x <= W; x += 3) {
      var nx = x / W;
      var y  = baseY + sineWave(nx * W, t, wave.freq, wave.spd, wave.phase) * amp;
      if (x === 0) ctx.moveTo(x, y);
      else         ctx.lineTo(x, y);
    }
    ctx.strokeStyle = 'rgba(255,255,255,' + (0.55 * alphaScale) + ')';
    ctx.lineWidth   = 2.5;
    ctx.stroke();
    ctx.beginPath();
    for (var x = 0; x <= W; x += 3) {
      var nx = x / W;
      var y  = baseY + sineWave(nx * W, t, wave.freq, wave.spd, wave.phase) * amp + 4;
      if (x === 0) ctx.moveTo(x, y);
      else         ctx.lineTo(x, y);
    }
    ctx.strokeStyle = 'rgba(255,255,255,' + (0.20 * alphaScale) + ')';
    ctx.lineWidth   = 1.5;
    ctx.stroke();
  }


  function draw() {
    ctx.clearRect(0, 0, W, H);

    drawHorizon();
    drawSunReflection();

    // Draw waves back to front
    for (var i = 0; i < waves.length; i++) {
      drawWave(waves[i]);
    }

    // Foam crests on front waves
    drawFoamCrest(waves[5], 0.6);
    drawFoamCrest(waves[6], 0.9);
    drawFoamCrest(waves[7], 1.0);

    t++;
    requestAnimationFrame(draw);
  }

  draw();
})();
</script>
